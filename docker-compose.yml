services:
  postgres:
    image: postgres:16-alpine
    container_name: healthcare-postgres
    environment:
      POSTGRES_DB: healthcare
      POSTGRES_USER: healthcare
      POSTGRES_PASSWORD: CHANGE_ME_DEV_ONLY
    ports:
      - "5432:5432"
    volumes:
      - healthcare_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthcare -d healthcare"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  healthcare_pgdata:
